[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_ENABLED = "false"

[functions]
  timeout = 30

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:;"
